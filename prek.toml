fail_fast = true
exclude = { glob = ["target/**"] }

[[repos]]
repo = "builtin"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "mixed-line-ending" },
  { id = "trailing-whitespace" },
  # 空ファイルに対して rustfmt と挙動が衝突するため pbt/src/lib.rs は除外する
  { id = "end-of-file-fixer", exclude = "^pbt/src/lib\\.rs$" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "cargo-fmt",
    name = "cargo fmt",
    entry = "cargo fmt --all -- --check",
    language = "system",
    types = ["rust"],
    pass_filenames = false,
    priority = 0,
  },
  {
    id = "cargo-clippy",
    name = "cargo clippy",
    entry = "cargo clippy --workspace --all-targets --features source-build -- -D warnings",
    language = "system",
    types = ["rust"],
    pass_filenames = false,
    priority = 10,
  },
]
